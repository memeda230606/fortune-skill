name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }} · Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
        python: ['3.11']
        # Probe the lower Node bound (declared in INSTALL.md) on a single Python.
        include:
          - node: '18'
            python: '3.11'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Node.js dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run verify suite
        run: npm run verify

      - name: Run privacy-check (no-git mode)
        run: node scripts/privacy-check.mjs --no-git

  shellcheck:
    name: Shellcheck install.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
